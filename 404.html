<!DOCTYPE html>
<html>
<head>
  <script type="text/javascript">
    // Capture the current URL path (e.g., /user/username)
    var currentPath = window.location.pathname + window.location.search + window.location.hash;

    // Redirect to index.html with the original path as a fragment (hash)
    window.location.href = '/index.html#' + currentPath;
  </script>
</head>
<body>
</body>
</html>
